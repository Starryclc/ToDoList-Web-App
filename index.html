<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="./assets/css/todo-app.css">
</head>
<body>

    <!-- Sidebar -->
    <aside>
        <div class="sidebar-header">To Do List</div>
        <div class="sidebar-search" id="sidebar-search-wrap">
            <svg class="icon-gray" style="width:16px;height:16px" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79L20 21.49 21.49 20 15.5 14zM9.5 14C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input id="sidebar-search-input" type="text" placeholder="搜索" autocomplete="off">
            <button id="sidebar-search-clear" class="sidebar-search-clear" title="清除">×</button>
        </div>
        <div class="nav-list" id="nav-list"></div>

        <div class="new-list-input">
            <svg class="icon-blue" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            <input type="text" id="new-list-input" placeholder="新建任务清单" autocomplete="off">
        </div>

        <div class="sidebar-footer">
            <button id="btn-export" class="btn-sm">备份</button>
            <button id="btn-import" class="btn-sm">恢复</button>
            <button id="btn-archive" class="btn-sm">归档</button>
            <input type="file" id="importFile" style="display:none">
        </div>
    </aside>

    <!-- Main Content -->
    <main>
        <div class="header">
            <div class="header-title-group">
                <h1 id="view-title">我的一天</h1>
                <div class="date">
                    <span id="current-date"></span>
                    <span id="progress-stats" class="progress-pill">已完成 0/0</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="btn-toggle-completed" class="btn-toggle-completed active" title="显示/隐藏已完成">
                    <svg style="width:16px;height:16px" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    <span id="toggle-completed-text">隐藏已完成</span>
                </button>
                <button id="btn-toggle-notes" class="btn-toggle-completed" title="显示/隐藏详情">
                    <svg style="width:16px;height:16px" viewBox="0 0 24 24"><path d="M3 18h12v-2H3v2zM3 6v2h18V6H3zm0 7h18v-2H3v2z"/></svg>
                    <span id="toggle-notes-text">展示详情</span>
                </button>
            </div>
        </div>

        <div class="filter-toolbar">
            <div class="scope-pill">未完成</div>
            <div class="filter-group">
            <div class="filter-item sort-pill">
                <select id="sort-mode">
                    <option value="default">默认排序</option>
                    <option value="due_asc">按截止日期升序</option>
                    <option value="due_desc">按截止日期降序</option>
                    <option value="added_asc">按创建日期升序</option>
                    <option value="added_desc">按创建日期降序</option>
                </select>
            </div>
            <button id="btn-clear-sort" class="sort-clear-btn" title="取消筛选">×</button>
            </div>
        </div>

        <div class="task-container">
            <div id="completed-sticky-indicator" class="completed-sticky-indicator">
                <span class="completed-divider-pill">已完成</span>
            </div>
            <ul id="task-list" style="list-style:none; padding:0; margin:0"></ul>
        </div>

        <div class="input-wrapper collapsed" id="task-input-wrapper">
            <div class="input-main-group">
                <div class="input-row title">
                    <svg viewBox="0 0 24 24" class="icon-blue"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    <input type="text" id="task-text" placeholder="添加任务..." autocomplete="off">
                </div>
                <ul id="add-step-list" class="step-list edit-step-list add-step-list"></ul>
                <div class="input-row step-inline" id="add-step-row">
                    <svg viewBox="0 0 24 24" class="icon-blue"><path d="M3 7h10v2H3V7zm0 4h8v2H3v-2zm0 4h6v2H3v-2zm16.59-4.58L21 11.84l-4.24 4.24-2.12-2.12 1.41-1.41.71.71 2.83-2.84z"/></svg>
                    <input id="task-step-input" class="step-inline-input" type="text" placeholder="添加步骤" autocomplete="off">
                </div>
            </div>
            <div class="input-advanced">
                <div class="input-advanced-actions">
                    <button type="button" id="btn-collapse-input" class="btn-collapse-input" title="收起">⌄</button>
                </div>
                <div class="input-controls">
                    <div class="control-group datetime-group">
                        <svg class="icon-gray" style="width:14px;height:14px" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
                        <input type="date" id="task-date" title="截止日期" autocomplete="off">
                        <svg class="icon-gray dt-mid-icon" style="width:14px;height:14px" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm.01 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13h-1.5v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                        <input type="time" id="task-time" title="具体时间 (可选)" autocomplete="off">
                        <button type="button" id="btn-clear-task-time-x" class="btn-clear-time-x" title="清除具体时间">×</button>
                    </div>
                    <div class="control-group quick-time-buttons">
                        <button type="button" class="btn-quick-time" data-time="end-of-day">下班前</button>
                        <button type="button" class="btn-quick-time" data-time="tomorrow">明天前</button>
                        <button type="button" class="btn-quick-time" data-time="this-friday">周五前</button>
                        <button type="button" class="btn-quick-time" data-time="next-friday">下周前</button>
                    </div>
                    <div class="control-group">
                        <svg class="icon-gray" style="width:14px;height:14px" viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                        <select id="task-recurrence">
                            <option value="none">不重复</option>
                            <option value="daily">每天</option>
                            <option value="weekly">每周</option>
                            <option value="monthly">每月</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <svg class="icon-gray" style="width:14px;height:14px" viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
                        <select id="task-list-select"></select>
                    </div>
                    <div style="margin-left:auto">
                        <button id="btn-add-task" class="btn-sm">添加</button>
                    </div>
                </div>
                <div class="input-row note">
                    <svg class="icon-gray" style="width:16px;height:16px" viewBox="0 0 24 24"><path d="M3 18h12v-2H3v2zM3 6v2h18V6H3zm0 7h18v-2H3v2z"/></svg>
                    <textarea id="task-note" placeholder="备注 (可选)..." autocomplete="off"></textarea>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal for Task and List Edit -->
    <div id="modal-overlay" class="modal-overlay">
        <!-- Edit Task Modal -->
        <div class="modal" id="modal-task-edit" style="display:none">
            <h2>编辑任务</h2>
            <div class="form-group">
                <label>任务内容</label>
                <input type="text" id="edit-task-text" class="form-input">
            </div>
            <div class="form-group">
                <label>步骤</label>
                <div id="edit-steps-box" class="edit-steps-box">
                    <ul id="edit-step-list" class="step-list edit-step-list"></ul>
                    <div class="step-add-row">
                        <svg class="step-add-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        <input id="edit-step-input" class="step-input" type="text" placeholder="添加步骤">
                    </div>
                </div>
            </div>
            <div style="display:flex; gap: 16px;">
                <div class="form-group" style="flex:1">
                    <label>截止日期</label>
                    <input type="date" id="edit-task-date" class="form-input">
                </div>
                <div class="form-group" style="flex:1">
                    <label>具体时间 (可选)</label>
                    <div class="time-input-row">
                        <input type="time" id="edit-task-time" class="form-input">
                        <button type="button" id="btn-clear-edit-time-x" class="btn-clear-time-x" title="清除具体时间">×</button>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>快捷时间</label>
                <div class="quick-time-buttons">
                    <button type="button" class="btn-quick-time-edit" data-time="end-of-day">下班前</button>
                    <button type="button" class="btn-quick-time-edit" data-time="tomorrow">明天前</button>
                    <button type="button" class="btn-quick-time-edit" data-time="this-friday">周五前</button>
                    <button type="button" class="btn-quick-time-edit" data-time="next-friday">下周前</button>
                </div>
            </div>
            <div style="display:flex; gap: 16px;">
                <div class="form-group" style="flex:1">
                    <label>重复</label>
                    <select id="edit-task-recurrence" class="form-input">
                        <option value="none">不重复</option>
                        <option value="daily">每天</option>
                        <option value="weekly">每周</option>
                        <option value="monthly">每月</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1">
                    <label>所属列表</label>
                    <select id="edit-task-list" class="form-input"></select>
                </div>
            </div>
            <div class="form-group">
                <label>备注/详情</label>
                <textarea id="edit-task-note" class="form-input" placeholder="添加备注..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-sm btn-cancel">取消</button>
                <button id="btn-save-task-edit" class="btn-sm btn-primary">保存</button>
            </div>
        </div>

        <!-- Edit List Modal -->
        <div class="modal" id="modal-list-edit" style="display:none">
            <h2>重命名列表</h2>
            <div class="form-group">
                <label>列表名称</label>
                <input type="text" id="edit-list-name" class="form-input">
            </div>
            <div class="modal-actions">
                <button class="btn-sm btn-cancel">取消</button>
                <button id="btn-save-list-edit" class="btn-sm btn-primary">保存</button>
            </div>
        </div>
    </div>

    <script src="./assets/js/todo-app.js"></script>
</body>
</html>
